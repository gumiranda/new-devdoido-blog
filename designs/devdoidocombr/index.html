<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark" data-variant="pure">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>devdoido — redesign</title>

  <!-- Fonts: Bebas Neue (display, Futura ND substitute), Inter (UI), JetBrains Mono (code), Anton + Archivo Black (display alts), Geist (UI alt) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Anton&family=Archivo+Black&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="tokens.css" />

  <!-- React + Babel pinned versions -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    /* loading state */
    html, body { background: #0a0a0a; color: #f5f5f5; }
    #root { min-height: 100vh; }
    .__boot {
      position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: "JetBrains Mono", monospace; font-size: 13px; color: #737373; gap: 16px;
      text-align: center;
    }
    .__boot b { color: #ffffff; font-weight: 500; }
    .__boot .pulse { display: inline-block; width: 8px; height: 8px; background: #ffffff; border-radius: 50%; animation: __pulse 1s ease-in-out infinite; }
    @keyframes __pulse { 50% { opacity: 0.3; } }
    .__boot .__esc { font-size: 11px; color: #525252; max-width: 420px; line-height: 1.6; }
    .__boot .__btn { margin-top: 8px; padding: 8px 16px; background: transparent; border: 1px solid #404040; color: #a3a3a3; border-radius: 30px; cursor: pointer; font: inherit; }
    .__boot .__btn:hover { color: #f5f5f5; border-color: #f5f5f5; }
  </style>
  <script>
    // Always reset stale canvas pan/zoom so the user lands on content,
    // not on empty space. Persistence isn't useful during design iteration.
    (function () {
      try {
        var del = [];
        for (var i = 0; i < localStorage.length; i++) {
          var k = localStorage.key(i);
          if (k && k.indexOf('dc-viewport:') === 0) del.push(k);
        }
        del.forEach(function (k) { localStorage.removeItem(k); });
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div id="root">
    <div class="__boot">
      <div><span class="pulse"></span> &nbsp;<b>// devdoido</b> &nbsp;design system booting…</div>
      <div class="__esc">
        Carregando 8 módulos JSX + fontes. Primeira carga pode levar ~5s.<br/>
        Se travar mais que 15s, clica abaixo pra resetar cache do canvas.
      </div>
      <button class="__btn" onclick="(function(){try{var k=[];for(var i=0;i&lt;localStorage.length;i++){var x=localStorage.key(i);if(x)k.push(x)}k.forEach(function(x){localStorage.removeItem(x)});location.reload()}catch(e){location.reload()}})()">↻ reset &amp; reload</button>
    </div>
  </div>

  <!-- Starter components: load JSX scaffolds first -->
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <!-- All my code bundled into a single JSX to minimize sequential fetches -->
  <script type="text/babel" src="app-bundle.jsx"></script>
</body>
</html>
