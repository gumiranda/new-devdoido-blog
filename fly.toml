# Fly.io — API (Elysia + Bun)
# Deploy from repo root: fly deploy

app = "datacenteruberlandia"
primary_region = "gru"

[build]
  dockerfile = "apps/api/Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
